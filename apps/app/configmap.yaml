apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-app-html
data:
  generate.sh: |
    #!/bin/sh
    cat > /usr/share/nginx/html/index.html << EOF
    <!DOCTYPE html>
    <html>
    <head>
        <title>ArgoCD App</title>
        <style>
            body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column; }
            h1 { color: #333; }
            .info { color: #666; margin-top: 20px; }
            .badge { background: #4CAF50; color: white; padding: 5px 10px; border-radius: 5px; }
        </style>
    </head>
    <body>
        <h1>ArgoCD App</h1>
        <div class="info">
            <p><span class="badge">Version:</span> ${VERSION:-N/A}</p>
            <p><span class="badge">Pod:</span> $HOSTNAME</p>
            <p><span class="badge">IP:</span> $POD_IP</p>
            <p><em>This is a application for ArgoCD</em></p>
        </div>
    </body>
    </html>
    EOF
    exec nginx -g 'daemon off;'
