apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-app-traefik
spec:
  ingressClassName: traefik
  rules:
  - host: local.nginx.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-service
            port:
              number: 80
