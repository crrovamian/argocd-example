apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app
  labels:
    app: example-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: example-app
  template:
    metadata:
      labels:
        app: example-app
    spec:
      containers:
      - name: example-app
        image: nginx:1.25
        ports:
        - containerPort: 80
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: VERSION
          value: "v1"
        command: ["/bin/sh", "/scripts/generate.sh"]
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
        - name: scripts
          mountPath: /scripts
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: html-volume
        emptyDir: {}
      - name: scripts
        configMap:
          name: example-app-html
          defaultMode: 0777
